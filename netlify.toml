[build]
base = "frontend"
command = "npm install --legacy-peer-deps && npm run build"

[build.environment]
NPM_FLAGS = "--legacy-peer-deps"
NODE_VERSION = "20"

[[plugins]]
package = "@netlify/plugin-nextjs"

[[headers]]
for = "/*"
[headers.values]
X-Frame-Options = "SAMEORIGIN"
X-Content-Type-Options = "nosniff"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "camera=*, microphone=*, geolocation=()"
Content-Security-Policy = "frame-src 'self' https://verify.gooddollar.org https://*.gooddollar.org; default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https: wss:;"
